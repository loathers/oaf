	function updateParseItem(iid, field, info) {
		var tbl = $('#ic'+iid);
		var data = parseItem(tbl);
		if (!data) return;
		data[field] = info;
		var out = [];
		for (i in data) {
			if (!data.hasOwnProperty(i)) continue;
			out.push(i+'='+data[i]);
		}
		tbl.attr('rel', out.join('&'));
	}
	function parseItem(tbl) {
		tbl = $(tbl);
		var rel = tbl.attr('rel');
		var data = {};
		if (!rel) return data;
		var parts = rel.split('&');
		for (i in parts) {
			if (!parts.hasOwnProperty(i)) continue;
			var kv = parts[i].split('=');
			tbl.data(kv[0], kv[1]);
			data[kv[0]] = kv[1];
		}
		return data;
	}

	function fixTable(oldtbl) {
		var tds = [];
		var tbl = $(oldtbl).clone().empty();
		var ncols = window.numcols || 2;
		$(oldtbl).find('td.i').each(function () {
			tds.push(this);
			if (tds.length == ncols) {
				var tr = $('<tr></tr>');
				for (i=0; i<tds.length; i++) { tr.append(tds[i]); }
				tbl.append(tr);
				tds = [];	
			}
		});
		if (tds.length < ncols) {
			var tr = $('<tr></tr>');
			for (i=0; i<tds.length; i++) { tr.append(tds[i]); }
			tbl.append(tr);
		}
		$(oldtbl).replaceWith(tbl);
	}

		}
		var uia = function (e) {
			e.preventDefault();
			var p = $(this).parents('.ui-tooltip');
			$.get($(this).attr('href'), function (res) {
				p.empty().append(res);
			});
		};
		var ua = navigator.userAgent,
			        cname = (ua.match(/iP(hone|ad)/i)) ? "touchend" : "click";
		$(document).bind(cname, function (e) {
			if ($(e.target).parents('.ui-tooltip').length || $(e.target).is('.ircm')) return;
			 $('.tip').remove(); cur_tip = null; 
		});
		$(document).bind('contextmenu',function (e) {
			 $('.tip').remove(); cur_tip = null; 
		});
		if ($(document).live) $('.ui-tooltip a').live('click',uia);
		else if ($.on) $(document).on('click', '.ui-tooltip a', uia);
	});
</script>
